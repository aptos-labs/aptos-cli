name: Test CLI on Ubuntu

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-ubuntu-24:
    name: Ubuntu 24.04 (x86_64)
    runs-on: ubuntu-24.04
    concurrency: ci-${{ github.ref }}-ubuntu-24
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Display system info
        run: |
          echo "OS Release:"
          cat /etc/os-release
          echo ""
          echo "Architecture:"
          uname -m

      - name: Test CLI installation
        run: |
          echo "Testing CLI installation..."
          node ./dist/aptos.js --install

      - name: Verify CLI was installed
        run: |
          echo "Checking installation path..."
          ls -la ~/.local/bin/aptos
          echo ""
          echo "CLI version:"
          ~/.local/bin/aptos --version

      - name: Test CLI execution via wrapper
        run: |
          echo "Testing CLI version command..."
          node ./dist/aptos.js --version

      - name: Test CLI help
        run: |
          echo "Testing CLI help command..."
          node ./dist/aptos.js --help

      - name: Test CLI info command
        run: |
          echo "Testing CLI info command..."
          node ./dist/aptos.js info

      - name: Test CLI update
        run: |
          echo "Testing CLI update..."
          node ./dist/aptos.js --update

