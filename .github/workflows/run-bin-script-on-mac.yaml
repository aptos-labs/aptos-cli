name: Test CLI on macOS

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-with-homebrew:
    name: macOS (Homebrew)
    runs-on: macos-latest
    concurrency: ci-${{ github.ref }}-macos-homebrew
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify Homebrew is available
        run: |
          echo "Homebrew version:"
          brew --version

      - name: Test CLI installation (via Homebrew)
        run: |
          echo "Testing CLI installation..."
          node ./dist/aptos.js --install

      - name: Verify CLI was installed via Homebrew
        run: |
          echo "Checking Homebrew installation..."
          brew list aptos
          echo "CLI location:"
          which aptos || brew --prefix aptos

      - name: Test CLI execution
        run: |
          echo "Testing CLI version command..."
          node ./dist/aptos.js --version

      - name: Test CLI help
        run: |
          echo "Testing CLI help command..."
          node ./dist/aptos.js --help

      - name: Test CLI info command
        run: |
          echo "Testing CLI info command..."
          node ./dist/aptos.js info

  test-direct-download:
    name: macOS (Direct Download)
    runs-on: macos-latest
    concurrency: ci-${{ github.ref }}-macos-direct
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Remove Homebrew from PATH (simulate no Homebrew)
        run: |
          echo "Simulating environment without Homebrew..."
          # Rename brew temporarily to simulate it not being available
          sudo mv /opt/homebrew/bin/brew /opt/homebrew/bin/brew.bak || sudo mv /usr/local/bin/brew /usr/local/bin/brew.bak || true

      - name: Test CLI installation (direct download)
        run: |
          echo "Testing CLI installation via direct download..."
          node ./dist/aptos.js --install

      - name: Verify CLI was installed to ~/.local/bin
        run: |
          echo "Checking installation path..."
          ls -la ~/.local/bin/aptos
          echo "CLI version:"
          ~/.local/bin/aptos --version

      - name: Test CLI execution
        run: |
          echo "Testing CLI via wrapper..."
          node ./dist/aptos.js --version

      - name: Restore Homebrew
        if: always()
        run: |
          sudo mv /opt/homebrew/bin/brew.bak /opt/homebrew/bin/brew || sudo mv /usr/local/bin/brew.bak /usr/local/bin/brew || true
