name: Lint and Format

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Biome Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Biome
        uses: biomejs/setup-biome@v2

      - name: Run Biome
        run: biome check
